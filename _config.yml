title: "Ketharan"
description: "Notes on technology, travel, and everyday life."
author:
  name: Ketharan
url: "https://ketharan.github.io"

# bespoke theme lives in _layouts / assets (no gem theme)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# category-prefixed URLs, e.g. /travel/kyoto-in-autumn/
# (series posts override this with their own permalink)
permalink: /:categories/:slug/

# the three flavours this blog is organized around.
# label + blurb are consumed by _layouts; accent color is CSS (.cat-<slug>).
# NB: keyed as `sections` because `site.categories` is Jekyll-reserved.
sections:
  - slug: technical
    label: Technical
    blurb: "Cloud-native engineering, security, and things I build."
  - slug: travel
    label: Travel
    blurb: "Places I've been and what they were like on the ground."
  - slug: personal
    label: Personal
    blurb: "Life, reflections, and everything off the clock."
