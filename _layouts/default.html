<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title and page.url != "/" %}{{ page.title | split: '— ' | last }} · {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
{% seo title=false %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
<div class="progress" id="progress"></div>
<header class="site-header">
  <a class="brand" href="{{ '/' | relative_url }}"><span class="brand-mark">◆</span> Ketharan</a>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}">The series</a>
    <a href="https://github.com/Ketharan/agent-sandbox-eks" class="nav-ext">Companion repo ↗</a>
  </nav>
</header>
<main>{{ content }}</main>
<footer class="site-footer">
  <div class="footer-inner">
    <p><strong>Give every AI agent its own VM</strong> — a hands-on series, written to be followed by a human or an agent.</p>
    <p class="muted">Companion code: <a href="https://github.com/Ketharan/agent-sandbox-eks">github.com/Ketharan/agent-sandbox-eks</a> · Built with Jekyll on GitHub Pages.</p>
  </div>
</footer>
<script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
